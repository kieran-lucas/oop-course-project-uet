name: Generate Commit Graph

on:
  schedule:
    - cron: "11 22 * * *" # 22:11 UTC = 5:11 AM UTC+7
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 24 # Node 24+ để dùng dynamic import

      - name: Set GitHub token for script
        run: echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm install node-fetch@3

      - name: Run commit chart script
        run: node scripts/generate-commit-chart.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add scripts/commit-chart.svg
          git diff --cached --quiet || git commit -m "update commit chart"
          git push