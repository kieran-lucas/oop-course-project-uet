name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════
  # JOB 1: Check + Test (chạy mọi event)
  # ═══════════════════════════════════════════
  check-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: auction_test
          POSTGRES_USER: auction_user
          POSTGRES_PASSWORD: auction_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check code format (Spotless)
        run: ./gradlew spotlessCheck

      - name: Check coding convention (Checkstyle)
        run: ./gradlew checkstyleMain checkstyleTest

      - name: Run tests
        run: ./gradlew test
        env:
          DB_URL: jdbc:postgresql://localhost:5432/auction_test
          DB_USER: auction_user
          DB_PASSWORD: auction_pass

      - name: Generate coverage report
        if: always()
        run: ./gradlew jacocoTestReport

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/test/html/

  # ═══════════════════════════════════════════
  # JOB 2: Auto-format (chỉ push vào main)
  # ═══════════════════════════════════════════
  auto-format:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: check-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply Spotless formatting
        run: ./gradlew spotlessApply

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && exit 0
          git add .
          git commit -m "style: apply Spotless formatting [skip ci]"
          git push