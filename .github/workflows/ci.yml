name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JWT_SECRET: ci-test-only-jwt-secret-with-at-least-32-bytes

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: auction_test
          POSTGRES_USER: auction_user
          POSTGRES_PASSWORD: auction_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U auction_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Wait for PostgreSQL
        run: |
          for i in {1..15}; do
            pg_isready -h localhost -p 5432 -U auction_user && break
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Init DB schema
        run: |
          set -e

          echo "=== Dropping and recreating database to ensure clean state ==="
          psql -h localhost -U auction_user -d postgres -c "DROP DATABASE IF EXISTS auction_test;"
          psql -h localhost -U auction_user -d postgres -c "CREATE DATABASE auction_test;"

          echo "=== Running migration V1__initial_schema.sql ==="
          psql -h localhost -U auction_user -d auction_test \
            -f src/main/resources/db/migration/V1__initial_schema.sql

          echo "=== Running migration V2__seed_admin.sql ==="
          psql -h localhost -U auction_user -d auction_test \
            -f src/main/resources/db/migration/V2__seed_admin.sql

          echo "=== Running migration V3__add_balance.sql ==="
          psql -h localhost -U auction_user -d auction_test \
            -f src/main/resources/db/migration/V3__add_balance.sql

          echo "=== Verifying tables exist ==="
          psql -h localhost -U auction_user -d auction_test -c "\dt"
        env:
          PGPASSWORD: auction_pass

      - name: Check formatting
        run: ./gradlew spotlessCheck

      - name: Run verification
        run: ./gradlew clean test check jacocoTestReport --info --stacktrace
        env:
          JWT_SECRET: ci-test-only-jwt-secret-with-at-least-32-bytes
          DB_URL: jdbc:postgresql://localhost:5432/auction_test
          DB_USER: auction_user
          DB_PASSWORD: auction_pass

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/test/html/

      - name: Upload SpotBugs reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-reports
          path: build/reports/spotbugs/
