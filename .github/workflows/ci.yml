name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # cơ sở dữ liệu giả lập để chạy trên máy ảo
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: auction_test
          POSTGRES_USER: auction_user
          POSTGRES_PASSWORD: auction_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
# Tải mã nguồn của nhóm về máy ảo (Checkout), cài đặt ngôn ngữ Java bản 21, 
# cài đặt công cụ quản lý thư viện Gradle, và cuối cùng là cấp quyền chạy (chmod +x) cho file gradlew để 
# không bị lỗi từ chối truy cập.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Auto Format Code (Spotless)
        run: ./gradlew spotlessApply

      - name: Commit formatting changes (if any)
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && exit 0 || git commit -m "style: apply Spotless formatting [skip ci]"
          git push

      - name: Check coding convention (Checkstyle)
        run: ./gradlew checkstyleMain checkstyleTest

      - name: Run tests
        run: ./gradlew test
        env:
          DB_URL: jdbc:postgresql://localhost:5432/auction_test
          DB_USER: auction_user
          DB_PASSWORD: auction_pass

      - name: Generate coverage report
        if: always()
        run: ./gradlew jacocoTestReport

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/test/html/
# jacocoTestReport: Sinh ra một báo cáo (dạng trang web HTML) cho biết các bài test của đã bo phủ
#  được bao nhiêu phần trăm số dòng code trong dự án.

# upload-artifact: Đóng gói cái báo cáo đăng lên github

# Lệnh always đảm bảo báo cáo luôn được tạo ra ngay cả khi có bài test bị fail.