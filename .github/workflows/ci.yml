name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: auction_test
          POSTGRES_USER: auction_user
          POSTGRES_PASSWORD: auction_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U auction_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. Setup Java
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      # 3. Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      # 4. Wait for PostgreSQL ready
      - name: Wait for PostgreSQL
        run: |
          for i in {1..15}; do
            pg_isready -h localhost -p 5432 -U auction_user && break
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
      
      # 5. Install psql client
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      
      # 6. Init schema (QUAN TRỌNG NHẤT)
      - name: Init DB schema
        run: |
          psql -h localhost -U auction_user -d auction_test \
          -f src/main/resources/db/migration/V1__initial_schema.sql
        env:
          PGPASSWORD: auction_pass
      
      # 7. Format code (optional)
      - name: Auto Format Code (Spotless)
        run: ./gradlew spotlessApply
      
      - name: Commit formatting changes (if any)
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && exit 0 || git commit -m "style: apply Spotless formatting [skip ci]"
          git push
      
      # 8. Check style
      - name: Check coding convention (Checkstyle)
        run: ./gradlew checkstyleMain checkstyleTest
      
      # 9. Run tests (có DB) - THÊM --info --stacktrace để debug
      - name: Run tests with debug info
        run: ./gradlew test --info --stacktrace
        env:
          DB_URL: jdbc:postgresql://localhost:5432/auction_test
          DB_USER: auction_user
          DB_PASSWORD: auction_pass
      
      # 10. Coverage
      - name: Generate coverage report
        if: always()
        run: ./gradlew jacocoTestReport
      
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/test/html/
